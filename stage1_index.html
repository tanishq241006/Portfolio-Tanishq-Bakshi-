<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanishq Bakshi — AI/ML Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080C14;
    --bg2: #0D1320;
    --card: #111827;
    --border: #1E2D45;
    --accent: #00C2FF;
    --accent2: #7B61FF;
    --accent3: #00FFB2;
    --text: #E8EFF8;
    --muted: #6B7E96;
    --white: #FFFFFF;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4rem;
    background: rgba(8,12,20,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Space Mono', monospace;
    font-size: 1rem; color: var(--accent);
    letter-spacing: 0.05em;
  }

  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    color: var(--muted); text-decoration: none;
    font-size: 0.88rem; letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    padding: 8rem 4rem 4rem;
    position: relative;
    overflow: hidden;
  }

  /* Animated gradient orbs */
  .orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 500px; height: 500px; background: var(--accent2); top: -100px; right: -100px; }
  .orb2 { width: 400px; height: 400px; background: var(--accent); bottom: 0; left: -150px; animation-delay: -4s; }
  .orb3 { width: 300px; height: 300px; background: var(--accent3); top: 40%; left: 40%; animation-delay: -8s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(40px, 30px) scale(1.1); }
  }

  .hero-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem; color: var(--accent3);
    letter-spacing: 0.15em; text-transform: uppercase;
    margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 0.7rem;
  }
  .hero-tag::before {
    content: ''; display: block;
    width: 32px; height: 1px; background: var(--accent3);
  }

  .hero h1 {
    font-size: clamp(2.8rem, 6vw, 5.5rem);
    font-weight: 700; line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
  }

  .hero h1 .name { color: var(--white); }
  .hero h1 .role {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-desc {
    max-width: 560px; color: var(--muted);
    font-size: 1.05rem; line-height: 1.75;
    margin-bottom: 2.5rem;
  }

  .hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; }

  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.8rem 1.8rem;
    border-radius: 6px; font-size: 0.9rem; font-weight: 600;
    text-decoration: none; cursor: pointer; border: none;
    font-family: 'Space Grotesk', sans-serif;
    transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-2px); }
  .btn-outline {
    background: transparent;
    color: var(--text); border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

  /* Stats strip */
  .stats-strip {
    display: flex; gap: 3rem; margin-top: 4rem; padding-top: 3rem;
    border-top: 1px solid var(--border); flex-wrap: wrap;
  }
  .stat-item { }
  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 2rem; font-weight: 700; color: var(--accent);
  }
  .stat-label { font-size: 0.82rem; color: var(--muted); margin-top: 0.2rem; }

  /* ── SECTION SHELL ── */
  section { padding: 6rem 4rem; position: relative; }
  section:nth-child(even) { background: var(--bg2); }

  .section-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem; color: var(--accent);
    letter-spacing: 0.18em; text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  .section-title {
    font-size: clamp(1.8rem, 3.5vw, 2.6rem);
    font-weight: 700; line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }

  .section-lead {
    color: var(--muted); font-size: 1rem; max-width: 520px;
    line-height: 1.8; margin-bottom: 3rem;
  }

  /* ── SKILLS ── */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.2rem;
  }

  .skill-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.6rem;
    transition: border-color 0.2s, transform 0.2s;
  }
  .skill-card:hover { border-color: var(--accent); transform: translateY(-4px); }

  .skill-card-icon {
    font-size: 1.8rem; margin-bottom: 0.9rem;
  }
  .skill-card h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.6rem; }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.8rem; }
  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem; padding: 0.25rem 0.7rem;
    border-radius: 4px; border: 1px solid var(--border);
    color: var(--muted);
  }
  .tag.highlight { border-color: var(--accent); color: var(--accent); }
  .tag.purple { border-color: var(--accent2); color: var(--accent2); }
  .tag.green { border-color: var(--accent3); color: var(--accent3); }

  /* ── PROJECTS ── */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
  }

  .project-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 2rem;
    display: flex; flex-direction: column;
    transition: border-color 0.2s, transform 0.2s;
    position: relative; overflow: hidden;
  }
  .project-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity 0.2s;
  }
  .project-card:hover { border-color: var(--accent2); transform: translateY(-5px); }
  .project-card:hover::before { opacity: 1; }

  .project-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem; color: var(--accent2);
    letter-spacing: 0.1em; margin-bottom: 1rem;
  }
  .project-card h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.7rem; }
  .project-card p { font-size: 0.9rem; color: var(--muted); flex: 1; line-height: 1.7; }
  .project-footer {
    margin-top: 1.5rem; padding-top: 1.2rem;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }

  /* ── CERTIFICATIONS ── */
  .certs-list { display: flex; flex-direction: column; gap: 1rem; max-width: 700px; }

  .cert-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.4rem 1.8rem;
    display: flex; align-items: center; gap: 1.5rem;
    transition: border-color 0.2s;
  }
  .cert-item:hover { border-color: var(--accent3); }
  .cert-badge {
    width: 48px; height: 48px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
  }
  .cert-badge.nptel { background: rgba(0,194,255,0.1); border: 1px solid rgba(0,194,255,0.2); }
  .cert-badge.oracle { background: rgba(123,97,255,0.1); border: 1px solid rgba(123,97,255,0.2); }

  .cert-info h3 { font-size: 0.95rem; font-weight: 600; }
  .cert-info p { font-size: 0.82rem; color: var(--muted); margin-top: 0.2rem; }
  .cert-date {
    margin-left: auto; font-family: 'Space Mono', monospace;
    font-size: 0.75rem; color: var(--muted); flex-shrink: 0;
  }

  /* ── EDUCATION ── */
  .edu-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 2rem 2.5rem;
    max-width: 680px;
    position: relative; overflow: hidden;
  }
  .edu-card::after {
    content: 'B.TECH';
    position: absolute; right: 2rem; top: 2rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem; color: var(--accent);
    letter-spacing: 0.15em; padding: 0.3rem 0.7rem;
    border: 1px solid var(--accent); border-radius: 4px;
  }
  .edu-inst { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem; }
  .edu-degree { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.2rem; }

  .edu-stats { display: flex; gap: 2.5rem; flex-wrap: wrap; }
  .edu-stat { }
  .edu-stat .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.2rem; font-family: 'Space Mono', monospace; }
  .edu-stat .value { font-size: 1.2rem; font-weight: 700; color: var(--accent); }

  /* ── CONTACT ── */
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem; max-width: 560px;
  }
  .contact-link {
    display: flex; align-items: center; gap: 1rem;
    padding: 1.2rem 1.5rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; text-decoration: none;
    color: var(--text); font-size: 0.88rem;
    transition: border-color 0.2s, transform 0.2s;
  }
  .contact-link:hover { border-color: var(--accent); transform: translateY(-3px); }
  .contact-link .icon { font-size: 1.2rem; }
  .contact-link span { font-size: 0.78rem; color: var(--muted); display: block; }

  /* ── FOOTER ── */
  footer {
    padding: 2rem 4rem; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.8rem; color: var(--muted); flex-wrap: wrap; gap: 1rem;
  }
  .footer-mono { font-family: 'Space Mono', monospace; color: var(--accent); }

  /* ── PROGRESS BARS ── */
  .skill-bar { margin-top: 0.7rem; }
  .skill-bar-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.35rem; }
  .bar-track { height: 4px; background: var(--border); border-radius: 2px; }
  .bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); animation: fillBar 1.5s ease forwards; }
  @keyframes fillBar { from { width: 0 !important; } }

  /* ── SCROLL INDICATOR ── */
  .scroll-indicator {
    position: absolute; bottom: 2.5rem; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    font-family: 'Space Mono', monospace; font-size: 0.65rem;
    color: var(--muted); letter-spacing: 0.1em;
  }
  .scroll-line {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--accent), transparent);
    animation: scrollPulse 2s ease-in-out infinite;
  }
  @keyframes scrollPulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { display: none; }
    .hero { padding: 6rem 1.5rem 3rem; }
    section { padding: 4rem 1.5rem; }
    .contact-grid { grid-template-columns: 1fr; }
    .stats-strip { gap: 1.5rem; }
    footer { padding: 1.5rem; flex-direction: column; }
  }

  /* Profile photo */
  .hero-inner { display: flex; align-items: flex-start; gap: 3rem; flex-wrap: wrap; }
  .hero-content { flex: 1; min-width: 280px; }
  .hero-photo-wrap {
    flex-shrink: 0;
    position: relative;
    margin-top: 1rem;
  }
  .hero-photo {
    width: 180px; height: 180px;
    border-radius: 50%;
    object-fit: cover; object-position: top;
    border: 3px solid transparent;
    background: linear-gradient(var(--bg), var(--bg)) padding-box,
                linear-gradient(135deg, var(--accent), var(--accent2)) border-box;
    display: block;
  }
  .hero-photo-ring {
    position: absolute; inset: -10px;
    border-radius: 50%;
    border: 1px dashed var(--accent);
    opacity: 0.4;
    animation: spinRing 20s linear infinite;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }
  .hero-photo-dot {
    position: absolute; bottom: 12px; right: 12px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent3);
    border: 2px solid var(--bg);
  }

  /* Cert images */
  .cert-thumb {
    width: 72px; height: 52px;
    object-fit: cover; border-radius: 6px;
    border: 1px solid var(--border);
    flex-shrink: 0; cursor: pointer;
    transition: transform 0.2s;
  }
  .cert-thumb:hover { transform: scale(1.05); }

  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
    align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw; max-height: 85vh;
    border-radius: 10px; box-shadow: 0 0 60px rgba(0,194,255,0.2);
  }
  .lightbox-close {
    position: fixed; top: 1.5rem; right: 1.5rem;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: border-color 0.2s;
  }
  .lightbox-close:hover { border-color: var(--accent); color: var(--accent); }

</style>
</head>

<nav>
  <div class="nav-logo">TB.dev</div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#certifications">Certs</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>

</head><body>
<nav><h2>TB.dev</h2></nav>
<section><h1>Tanishq Bakshi Portfolio</h1></section>
</body></html>
